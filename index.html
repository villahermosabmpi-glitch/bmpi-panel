<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Control · BMPI Villahermosa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: #E4E2DC;
    --border-strong: #C8C5BC;
    --text-primary: #1A1917;
    --text-secondary: #6B6860;
    --text-hint: #A8A59E;
    --sur: #0F6E56;
    --sur-light: #E1F5EE;
    --sur-mid: #1D9E75;
    --norte: #185FA5;
    --norte-light: #E6F1FB;
    --norte-mid: #378ADD;
    --accent: #1A1917;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* HEADER */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .topbar-title { font-size: 14px; font-weight: 500; }
  .topbar-sub { font-size: 12px; color: var(--text-secondary); }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    background: var(--bg);
    font-family: var(--mono);
  }
  .status-dot {
    width: 7px; height: 7px;
    background: #22c55e;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
  }

  /* LAYOUT */
  .main { max-width: 1100px; margin: 0 auto; padding: 2rem 2rem 4rem; }

  /* SECTION LABEL */
  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-hint);
    margin-bottom: 12px;
    margin-top: 2rem;
  }

  /* METRIC CARDS */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 2rem;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
  }
  .metric-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .metric-value {
    font-size: 28px;
    font-weight: 600;
    color: var(--text-primary);
    font-family: var(--mono);
    line-height: 1;
    margin-bottom: 4px;
  }
  .metric-sub { font-size: 11px; color: var(--text-hint); }

  /* ZONA CARDS */
  .zonas-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 2rem;
  }
  @media (max-width: 640px) { .zonas-grid { grid-template-columns: 1fr; } }
  .zona-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .zona-header {
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .zona-title-row { display: flex; align-items: center; gap: 8px; }
  .zona-pip { width: 8px; height: 8px; border-radius: 50%; }
  .zona-name { font-size: 14px; font-weight: 500; }
  .zona-total { font-size: 20px; font-weight: 600; font-family: var(--mono); }
  .zona-body { padding: 0.75rem 1.25rem; }
  .activo-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .activo-row:last-child { border-bottom: none; }
  .activo-info { min-width: 0; }
  .activo-name { font-size: 13px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .activo-insts { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
  .activo-right { text-align: right; flex-shrink: 0; }
  .activo-monto { font-size: 13px; font-weight: 500; font-family: var(--mono); }
  .activo-pct { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
  .bar-track { height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; }
  .bar-fill { height: 3px; border-radius: 2px; transition: width 0.6s ease; }

  /* CHART */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 2rem;
  }
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .chart-title { font-size: 13px; font-weight: 500; }
  .legend { display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .leg-sq { width: 8px; height: 8px; border-radius: 2px; }

  /* TABLA REGISTROS */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 2rem;
  }
  .table-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-title { font-size: 13px; font-weight: 500; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    padding: 8px 1.25rem;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-hint);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  td { padding: 10px 1.25rem; border-bottom: 1px solid var(--border); color: var(--text-primary); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }
  .mono { font-family: var(--mono); font-size: 12px; }
  .pct-badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: var(--mono);
  }

  /* LOADING / ERROR */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    color: var(--text-hint);
    font-size: 13px;
    gap: 10px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--text-secondary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: #dc2626; font-size: 13px; padding: 1rem 1.25rem; }

  /* FOOTER */
  .footer {
    font-size: 11px;
    color: var(--text-hint);
    display: flex;
    justify-content: space-between;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 4px;
  }

  /* REFRESH BTN */
  .btn-refresh {
    font-size: 12px;
    padding: 5px 14px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    font-family: var(--sans);
    transition: background 0.15s;
  }
  .btn-refresh:hover { background: var(--bg); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">BM</div>
    <div>
      <div class="topbar-title">BMPI · Villahermosa</div>
      <div class="topbar-sub">Contrato PEMEX 658236800</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="badge"><span class="status-dot"></span>En línea</span>
    <button class="btn-refresh" onclick="cargarDatos()">↺ Actualizar</button>
  </div>
</div>

<div class="main">

  <div class="section-label">Resumen general</div>
  <div class="metrics-grid" id="metricas">
    <div class="loading"><div class="spinner"></div> Cargando...</div>
  </div>

  <div class="section-label">Avance por zona</div>
  <div class="zonas-grid" id="zonas">
    <div class="loading"><div class="spinner"></div> Cargando...</div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <span class="chart-title">Monto ejecutado por activo</span>
      <div class="legend">
        <span class="legend-item"><span class="leg-sq" style="background:#1D9E75"></span>Zona Sur</span>
        <span class="legend-item"><span class="leg-sq" style="background:#378ADD"></span>Zona Norte</span>
      </div>
    </div>
    <div style="position:relative; width:100%; height:260px;">
      <canvas id="chartActivos" role="img" aria-label="Gráfica de monto ejecutado por activo"></canvas>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Registros de campo</span>
      <span id="total-registros" style="font-size:12px; color:var(--text-hint);"></span>
    </div>
    <div id="tabla-registros">
      <div class="loading"><div class="spinner"></div> Cargando...</div>
    </div>
  </div>

  <div class="footer">
    <span>Sistema PND · BMPI-VILLAHERMOSA · Panel administrativo</span>
    <span id="timestamp-footer"></span>
  </div>

</div>

<script>
const SUPA_URL = 'https://yclsicdbcvirvtjvvpcb.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljbHNpY2RiY3ZpcnZ0anZ2cGNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODEzMjIsImV4cCI6MjA5NTU1NzMyMn0.BUa1bKsulgXbA8DE93FPmjxze0Rnag-J1TWK-qRh-Ys';

const headers = {
  'apikey': SUPA_KEY,
  'Authorization': 'Bearer ' + SUPA_KEY,
  'Content-Type': 'application/json'
};

async function query(tabla, params = '') {
  const r = await fetch(`${SUPA_URL}/rest/v1/${tabla}?${params}`, { headers });
  if (!r.ok) throw new Error(`Error ${r.status} en ${tabla}`);
  return r.json();
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return '$' + Number(n).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

let barChart = null;

async function cargarDatos() {
  try {
    // Fetch paralelo
    const [zonas, activos, registros, tecnicos] = await Promise.all([
      query('zonas', 'select=id,nombre&order=id'),
      query('activos', 'select=id,nombre,id_zona&activo=eq.true&order=id'),
      query('registros_campo', 'select=id,id_activo,id_instalacion,fecha,udc,cantidad,porcentaje_avance,precio_congelado,monto,id_tecnico,id_partida&order=creado_el.desc'),
      query('tecnicos', 'select=id,nombre_completo,num_colaborador&activo=eq.true')
    ]);

    // Índices
    const zonaIdx = {};
    zonas.forEach(z => zonaIdx[z.id] = z.nombre);

    const activoIdx = {};
    activos.forEach(a => activoIdx[a.id] = { nombre: a.nombre, id_zona: a.id_zona });

    // Totales por activo
    const montoActivo = {};
    const contActivo = {};
    activos.forEach(a => { montoActivo[a.id] = 0; contActivo[a.id] = 0; });
    registros.forEach(r => {
      if (r.monto) { montoActivo[r.id_activo] = (montoActivo[r.id_activo] || 0) + Number(r.monto); }
      contActivo[r.id_activo] = (contActivo[r.id_activo] || 0) + 1;
    });

    // Totales por zona
    const montoZona = {};
    zonas.forEach(z => montoZona[z.id] = 0);
    activos.forEach(a => { montoZona[a.id_zona] = (montoZona[a.id_zona] || 0) + (montoActivo[a.id] || 0); });
    const totalGeneral = Object.values(montoZona).reduce((s, v) => s + v, 0);

    // ── MÉTRICAS ──
    document.getElementById('metricas').innerHTML = `
      <div class="metric-card">
        <div class="metric-label">Monto total ejecutado</div>
        <div class="metric-value">${fmt(totalGeneral)}</div>
        <div class="metric-sub">MXN · ${registros.length} registro${registros.length !== 1 ? 's' : ''}</div>
      </div>
      ${zonas.map(z => `
      <div class="metric-card">
        <div class="metric-label">Zona ${z.nombre}</div>
        <div class="metric-value" style="color:${z.id === 1 ? 'var(--norte)' : 'var(--sur)'}">${fmt(montoZona[z.id])}</div>
        <div class="metric-sub">${totalGeneral > 0 ? ((montoZona[z.id]/totalGeneral)*100).toFixed(1) : '0.0'}% del total</div>
      </div>`).join('')}
      <div class="metric-card">
        <div class="metric-label">Técnicos activos</div>
        <div class="metric-value">${tecnicos.length}</div>
        <div class="metric-sub">${tecnicos.map(t => t.nombre_completo || t.num_colaborador).join(', ') || '—'}</div>
      </div>
    `;

    // ── ZONAS ──
    const zonasHTML = zonas.map(z => {
      const isSur = z.id === 2;
      const color = isSur ? 'var(--sur)' : 'var(--norte)';
      const colorMid = isSur ? 'var(--sur-mid)' : 'var(--norte-mid)';
      const colorLight = isSur ? 'var(--sur-light)' : 'var(--norte-light)';
      const activosZona = activos.filter(a => a.id_zona === z.id);
      const maxMonto = Math.max(...activosZona.map(a => montoActivo[a.id] || 0), 1);

      return `
      <div class="zona-card">
        <div class="zona-header">
          <div class="zona-title-row">
            <div class="zona-pip" style="background:${colorMid}"></div>
            <span class="zona-name">Zona ${z.nombre}</span>
          </div>
          <span class="zona-total" style="color:${color}">${fmt(montoZona[z.id])}</span>
        </div>
        <div class="zona-body">
          ${activosZona.map(a => {
            const m = montoActivo[a.id] || 0;
            const pct = maxMonto > 0 ? (m / maxMonto * 100) : 0;
            return `
            <div class="activo-row">
              <div class="activo-info">
                <div class="activo-name">${a.nombre}</div>
                <div class="activo-insts">${contActivo[a.id] || 0} registro${(contActivo[a.id] || 0) !== 1 ? 's' : ''}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${colorMid}"></div></div>
              </div>
              <div class="activo-right">
                <div class="activo-monto" style="color:${m > 0 ? color : 'var(--text-hint)'}">${fmt(m)}</div>
                <div class="activo-pct">${m > 0 && montoZona[z.id] > 0 ? ((m/montoZona[z.id])*100).toFixed(1)+'%' : ''}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    });
    document.getElementById('zonas').innerHTML = zonasHTML.join('');

    // ── GRÁFICA ──
    const labels = activos.map(a => a.nombre.length > 18 ? a.nombre.substring(0,16)+'…' : a.nombre);
    const data = activos.map(a => montoActivo[a.id] || 0);
    const colors = activos.map(a => {
      const zona = a.id_zona;
      const isSur = zona === 2;
      return (montoActivo[a.id] || 0) > 0
        ? (isSur ? '#1D9E75' : '#378ADD')
        : (isSur ? '#9FE1CB' : '#B5D4F4');
    });

    if (barChart) barChart.destroy();
    barChart = new Chart(document.getElementById('chartActivos'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Monto ejecutado',
          data,
          backgroundColor: colors,
          borderRadius: 4,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => fmt(ctx.parsed.y) + ' MXN'
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11 } } },
          y: {
            grid: { color: 'rgba(0,0,0,0.05)' },
            ticks: {
              font: { size: 11 },
              callback: v => '$' + (v/1000).toFixed(0) + 'k'
            }
          }
        }
      }
    });

    // ── TABLA REGISTROS ──
    document.getElementById('total-registros').textContent = `${registros.length} registro${registros.length !== 1 ? 's' : ''}`;

    if (registros.length === 0) {
      document.getElementById('tabla-registros').innerHTML = '<div class="loading">Sin registros capturados</div>';
    } else {
      const filas = registros.map(r => {
        const activo = activoIdx[r.id_activo] || {};
        const zona = activo.id_zona ? zonaIdx[activo.id_zona] : '—';
        const isSur = activo.id_zona === 2;
        const pct = Number(r.porcentaje_avance || 0);
        const pctColor = pct === 100 ? '#0F6E56' : pct >= 50 ? '#185FA5' : '#BA7517';
        const pctBg = pct === 100 ? '#E1F5EE' : pct >= 50 ? '#E6F1FB' : '#FAEEDA';
        return `<tr>
          <td>${r.fecha || '—'}</td>
          <td>${activo.nombre || r.id_activo}</td>
          <td><span style="font-size:11px; padding:2px 7px; border-radius:20px; background:${isSur ? '#E1F5EE' : '#E6F1FB'}; color:${isSur ? '#0F6E56' : '#185FA5'};">${zona}</span></td>
          <td class="mono">${r.udc || '—'}</td>
          <td class="mono" style="text-align:right;">${Number(r.cantidad || 0).toLocaleString('es-MX')}</td>
          <td style="text-align:center;"><span class="pct-badge" style="background:${pctBg}; color:${pctColor}">${pct}%</span></td>
          <td class="mono" style="text-align:right; font-weight:500;">${fmt(r.monto)}</td>
        </tr>`;
      }).join('');

      document.getElementById('tabla-registros').innerHTML = `
        <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Activo</th>
              <th>Zona</th>
              <th>UDC</th>
              <th style="text-align:right">Cantidad</th>
              <th style="text-align:center">Avance</th>
              <th style="text-align:right">Monto</th>
            </tr>
          </thead>
          <tbody>${filas}</tbody>
        </table>
        </div>`;
    }

    // Footer timestamp
    document.getElementById('timestamp-footer').textContent =
      'Actualizado: ' + new Date().toLocaleString('es-MX');

  } catch (err) {
    console.error(err);
    document.getElementById('metricas').innerHTML = `<div class="error-msg">Error al conectar con Supabase: ${err.message}</div>`;
  }
}

cargarDatos();
</script>
</body>
</html>
